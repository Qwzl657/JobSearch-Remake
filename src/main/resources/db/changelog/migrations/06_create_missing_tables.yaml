databaseChangeLog:
  - changeSet:
      id: add-parent-id-to-categories
      author: you
      changes:
        - addColumn:
            tableName: categories
            columns:
              - column:
                  name: parent_id
                  type: INT

  - changeSet:
      id: create-messages-table
      author: you
      changes:
        - createTable:
            tableName: messages
            columns:
              - column:
                  name: id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: responded_applicants
                  type: INT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_message_response
                    references: responded_applicants(id)
              - column:
                  name: content
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: timestamp
                  type: TIMESTAMP
                  constraints:
                    nullable: false
  - changeSet:
      id: fix-messages-content-type
      author: you
      changes:
        - modifyDataType:
            tableName: messages
            columnName: content
            newDataType: VARCHAR(1000)