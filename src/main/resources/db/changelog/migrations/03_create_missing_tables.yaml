databaseChangeLog:
  - changeSet:
      id: create-messages
      author: jobsearch
      changes:
        - createTable:
            tableName: messages
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: responded_applicants
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_message_response
                    references: responded_applicants(id)
              - column:
                  name: content
                  type: VARCHAR(1000)
                  constraints:
                    nullable: false
              - column:
                  name: timestamp
                  type: TIMESTAMP
                  constraints:
                    nullable: false