databaseChangeLog:
  - changeSet:
      id: create-authorities
      author: jobsearch
      changes:
        - createTable:
            tableName: authorities
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: authority
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

  - changeSet:
      id: create-roles
      author: jobsearch
      changes:
        - createTable:
            tableName: roles
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: authority_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_role_authority
                    references: authorities(id)