server:
  port: 9092

spring:
  application:
    name: Lesson 49
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  datasource:
    url: jdbc:h2:file:./db/test;AUTO_SERVER=TRUE
    username: root
    password: qwerty
    driver-class-name: org.h2.Driver

  liquibase:
    change-log: classpath:db/changelog/master.yaml

  h2:
    console:
      enabled: true

  sql:
    init:
      mode: never

logging:
  config: classpath:logback-spring.xml